name: CI

on:
  push:
    branches:
      - dev

  pull_request:
    branches:
      - dev
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Build ReScript
        run: pnpm res:build

      - name: Run unit tests with coverage
        run: pnpm test:coverage

      - name: Generate coverage badge
        if: github.event_name == 'push'
        run: |
          BADGE_INFO=$(node -e "
            const c = JSON.parse(require('fs').readFileSync('./coverage/coverage-summary.json', 'utf8'));
            const pct = c.total.lines.pct;
            const color = pct >= 80 ? 'brightgreen' : pct >= 60 ? 'yellow' : pct >= 40 ? 'orange' : 'red';
            console.log(pct + ' ' + color);
          ")
          COVERAGE=$(echo $BADGE_INFO | cut -d' ' -f1)
          COLOR=$(echo $BADGE_INFO | cut -d' ' -f2)
          mkdir -p badges
          curl -s "https://img.shields.io/badge/coverage-${COVERAGE}%25-${COLOR}" -o ./badges/coverage.svg

      - name: Commit coverage badge
        if: github.event_name == 'push'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add badges/coverage.svg
          git diff --staged --quiet || git commit -m "chore: update coverage badge [skip ci]"
          git push

      - name: Verify build
        run: pnpm build

      - name: Merge to main on success
        if: success()
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.repos.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              base: 'main',
              head: 'dev'
            })
