spec:
  name: hikma-health-server
  services:
    - name: web
      environment_slug: node-js
      build_command: "CI=true pnpm install --filter 'hikma-health-server...' && pnpm server:build"
      run_command: "pnpm server:start"
      instance_count: 1
      instance_size_slug: apps-s-1vcpu-0.5gb
      envs:
        - key: DATABASE_URL
          value: ${db.DATABASE_URL}
          scope: RUN_AND_BUILD_TIME
        - key: NODE_ENV
          value: production
          scope: RUN_AND_BUILD_TIME
        - key: NODE_VERSION
          value: "24.14.0"
          scope: RUN_AND_BUILD_TIME
        - key: NODE_OPTIONS
          value: "--max-old-space-size=5120"
          scope: RUN_AND_BUILD_TIME
  databases:
    - name: db
      engine: PG
      production: false
      version: "18"
