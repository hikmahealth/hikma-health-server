dependsOn:
  - ui
  - database
language: typescript

tasks:
  build:
    args: "run build"
    command: pnpm
    deps:
      - ui:build
    outputs:
      - .output/**/*
  dev:
    command: pnpm run dev
    deps:
      - database:dev
    preset: server
  start:
    command: pnpm run start
    # should ensure the migration runs successfully before starting the service
    deps:
      - database:migrate
