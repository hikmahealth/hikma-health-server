dependsOn:
  - ui
  - database
language: typescript

tasks:
  build:
    args: "run build"
    command: pnpm
    deps:
      - ui:build
    outputs:
      - .output/**/*
    env:
      NODE_OPTIONS: --max-old-space-size=4096
  dev:
    command: pnpm run dev
    deps:
      - database:dev
    preset: server
  recovery:
    command: pnpm run recovery:permissions
    deps:
      - database:migrate
    env:
      DB_MIGRATION: true
  start:
    inputs:
      - .output/**/*
    command: pnpm run start-only
    # should ensure the migration runs successfully before starting the service
    deps:
      - server:recovery
