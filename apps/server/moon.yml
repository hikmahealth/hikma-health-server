layer: application
dependsOn:
  - ui
  - database
  - js-utils
language: typescript

tasks:
  build:
    args: "run build"
    command: pnpm
    deps:
      - ui:build
      - database:build
    outputs:
      - .output/**/*
  dev:
    command: pnpm run dev
    options:
      envFile: "/.env"
    deps:
      - database:dev
    preset: server
  recovery:
    command: pnpm run recovery-permissions
    deps:
      - database:build
      - database:migrate
    env:
      DB_MIGRATION: "true"
      DB_SSL: "true"

  start:
    inputs:
      - .output/**/*
    command: pnpm run start-only
    env:
      NODE_ENV: "production"
    # should ensure the migration runs successfully before starting the service
    # FIXME: Recovery is failing due to kysely/pg config issue with DB_SSL
    # deps:
    #   - server:recovery
