dependsOn:
  - ui
  - database

tasks:
  build:
    args: "run build"
    command: pnpm
    deps:
      - ui:build
    outputs:
      - .output/**/*
  dev:
    command: pnpm run dev
    deps:
      - database:dev
    preset: server
