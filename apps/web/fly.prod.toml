# fly.toml app configuration file generated for hh-webserver-test on 2026-02-17T23:33:26+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'hh-webserver-test'
primary_region = 'lax'
kill_signal = 'SIGTERM'

[build]


[deploy]
  strategy = 'rolling'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
